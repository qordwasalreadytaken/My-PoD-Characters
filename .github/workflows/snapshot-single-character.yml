name: Snapshot Single Character

on:
  workflow_dispatch:
    inputs:
      character:
        description: Character name to snapshot
        required: true
        type: string
      title:
        description: Optional milestone title
        required: false
        type: string
      description:
        description: Optional milestone description
        required: false
        type: string
      journal:
        description: Optional journal text
        required: false
        type: string
      tags:
        description: Optional comma-separated tags
        required: false
        type: string
      slug:
        description: Optional URL-friendly key (e.g. first-uber-clear)
        required: false
        type: string
      story:
        description: Mark as story
        required: false
        default: false
        type: boolean
      favorite:
        description: Mark as favorite
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  snapshot-single:
    runs-on: ubuntu-latest
    concurrency:
      group: snapshot-single-character-${{ github.event.inputs.character }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Snapshot selected character with metadata
        run: |
          python manual_snapshot.py \
            --character "${{ github.event.inputs.character }}" \
            --title "${{ github.event.inputs.title }}" \
            --description "${{ github.event.inputs.description }}" \
            --journal "${{ github.event.inputs.journal }}" \
            --tags "${{ github.event.inputs.tags }}" \
            --slug "${{ github.event.inputs.slug }}" \
            --story "${{ github.event.inputs.story }}" \
            --favorite "${{ github.event.inputs.favorite }}"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots index.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git commit -m "chore: snapshot ${{ github.event.inputs.character }}"
          git push
