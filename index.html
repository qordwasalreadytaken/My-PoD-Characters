<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoD Character Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --bg-soft: #141414;
      --card: #1a1a1a;
      --card-alt: #212121;
      --ink: #e2e2e2;
      --muted: #a7a7a7;
      --accent: #c0a080;
      --accent-2: #d0d0d0;
      --good: #9ad1ac;
      --bad: #d99b9b;
      --line: #333333;
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "IBM Plex Sans", sans-serif;
      background:
        radial-gradient(circle at 15% 15%, #1b1b1b 0%, transparent 40%),
        radial-gradient(circle at 80% 0%, #121212 0%, transparent 35%),
        linear-gradient(160deg, #000000, #0a0a0a 45%, #111111);
      min-height: 100vh;
    }

    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 320px 360px minmax(0, 1fr);
      gap: 16px;
      min-height: 100vh;
    }

    .panel {
      background: linear-gradient(160deg, rgba(27, 27, 27, 0.94), rgba(12, 12, 12, 0.96));
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 12px 30px var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(24, 24, 24, 0.95), rgba(24, 24, 24, 0.65));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-title {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.02rem;
      letter-spacing: 0.02em;
    }

    .pill {
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .header-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .quickview-btn {
      border: 1px solid var(--line);
      background: rgba(14, 14, 14, 0.9);
      color: var(--accent-2);
      border-radius: 999px;
      padding: 5px 11px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 140ms ease, color 140ms ease, background 140ms ease;
    }

    .quickview-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(20, 20, 20, 0.96);
    }

    .quickview-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .section {
      padding: 14px 16px;
    }

    .filters {
      display: grid;
      gap: 10px;
    }

    .search {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(16, 16, 16, 0.95);
      color: var(--ink);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 120ms ease;
    }

    .search:focus {
      border-color: var(--accent-2);
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      overflow: auto;
    }

    .character-row,
    .snapshot-row {
      border: 0;
      width: 100%;
      text-align: left;
      background: transparent;
      color: inherit;
      cursor: pointer;
      border-top: 1px solid rgba(58, 58, 58, 0.72);
      padding: 12px 14px;
      transition: background 120ms ease, transform 120ms ease;
    }

    .character-row:hover,
    .snapshot-row:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .character-row.active,
    .snapshot-row.active {
      background: linear-gradient(90deg, rgba(192, 160, 128, 0.22), rgba(255, 255, 255, 0.04));
      border-left: 3px solid var(--accent);
      padding-left: 11px;
    }

    .name-line {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: baseline;
      font-weight: 600;
      color: var(--ink);
    }

    .muted {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .snapshot-meta {
      margin-top: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .kpi {
      background: rgba(20, 20, 20, 0.9);
      border: 1px solid rgba(58, 58, 58, 0.82);
      border-radius: 10px;
      padding: 10px;
    }

    .kpi .label {
      display: block;
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 2px;
    }

    .kpi .value {
      font-size: 1rem;
      font-weight: 600;
      font-family: "Space Grotesk", sans-serif;
    }

    .detail {
      padding: 16px;
      overflow: auto;
      animation: fadeIn 220ms ease;
    }

    .hero {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .hero h1 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(1.4rem, 2.3vw, 2rem);
      letter-spacing: 0.01em;
    }

    .hero small {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      background: rgba(26, 26, 26, 0.95);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(22, 22, 22, 0.92);
      padding: 12px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.95rem;
      color: var(--accent-2);
    }

    .stat-list,
    .flat-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 6px;
    }

    .share-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .share-label {
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 3px;
    }

    .share-url {
      display: block;
      color: var(--accent-2);
      text-decoration: none;
      overflow-wrap: anywhere;
      font-family: "Space Grotesk", sans-serif;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 9px;
      background: rgba(15, 15, 15, 0.9);
    }

    .share-url:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dashed rgba(36, 80, 102, 0.45);
      padding-bottom: 3px;
    }

    .change-chip {
      display: inline-block;
      border-radius: 999px;
      font-size: 0.72rem;
      padding: 3px 8px;
      border: 1px solid var(--line);
      background: rgba(17, 50, 69, 0.8);
      margin-right: 6px;
      margin-bottom: 6px;
      color: var(--muted);
    }

    .change-chip.good {
      border-color: rgba(123, 224, 165, 0.45);
      color: var(--good);
    }

    .change-chip.bad {
      border-color: rgba(255, 142, 142, 0.45);
      color: var(--bad);
    }

    .message {
      color: var(--muted);
      padding: 16px;
    }

    .quickview-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(1px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1200;
      padding: 22px;
    }

    .quickview-modal.open {
      display: flex;
    }

    .quickview-dialog {
      width: min(1200px, 100%);
      height: min(860px, 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #090909;
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.62);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .quickview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(20, 20, 20, 0.98), rgba(18, 18, 18, 0.9));
    }

    .quickview-title {
      margin: 0;
      color: var(--accent-2);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.02em;
    }

    .quickview-toolbar-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .quickview-nav {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .quickview-nav-btn {
      border: 1px solid var(--line);
      background: rgba(15, 15, 15, 0.92);
      color: var(--ink);
      border-radius: 8px;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      cursor: pointer;
      line-height: 1;
      font-weight: 700;
    }

    .quickview-nav-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .quickview-nav-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .quickview-nav-count {
      color: var(--muted);
      font-size: 0.8rem;
      min-width: 56px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .quickview-close {
      border: 1px solid var(--line);
      background: rgba(15, 15, 15, 0.92);
      color: var(--ink);
      border-radius: 8px;
      padding: 4px 9px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .quickview-close:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .quickview-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1200px) {
      .shell {
        grid-template-columns: 300px 320px minmax(0, 1fr);
      }
      .kpi-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
        min-height: auto;
      }
      .panel {
        max-height: 340px;
      }
      .detail-panel {
        max-height: none;
      }

      .quickview-dialog {
        width: 100%;
        height: 100%;
      }

      .quickview-modal {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel" aria-label="Characters">
      <header class="panel-header">
        <h2 class="panel-title">Character Archive</h2>
        <span id="characterCount" class="pill">0</span>
      </header>
      <div class="section filters">
        <input id="searchInput" class="search" type="text" placeholder="Search by character name">
        <input id="tagInput" class="search" type="text" placeholder="Filter snapshots by tag">
        <select id="characterSort" class="search" aria-label="Sort characters">
          <option value="default">Sort: Default</option>
          <option value="updated">Sort: Recently updated</option>
          <option value="snapshots">Sort: Most snapshots</option>
          <option value="alpha">Sort: A to Z</option>
        </select>
      </div>
      <ul id="characterList" class="list"></ul>
    </section>

    <section class="panel" aria-label="Snapshots">
      <header class="panel-header">
        <h2 class="panel-title">Timeline</h2>
        <span id="snapshotCount" class="pill">0</span>
      </header>
      <div class="section" id="timelineHeader">
        <div class="muted">Select a character to browse snapshots.</div>
      </div>
      <ul id="snapshotList" class="list"></ul>
    </section>

    <section class="panel detail-panel" aria-label="Snapshot detail">
      <header class="panel-header">
        <h2 class="panel-title">Snapshot Detail</h2>
        <div class="header-actions">
          <button id="quickviewButton" class="quickview-btn" type="button" disabled>Archived Armory Quickview</button>
          <span id="statusPill" class="pill">Idle</span>
        </div>
      </header>
      <div id="detailRoot" class="detail">
        <div class="message">Pick a character on the left to start.</div>
      </div>
    </section>
  </main>

  <div id="quickviewModal" class="quickview-modal" aria-hidden="true">
    <div class="quickview-dialog" role="dialog" aria-modal="true" aria-label="Armory quickview">
      <div class="quickview-toolbar">
        <h3 id="quickviewTitle" class="quickview-title">Armory Quickview</h3>
        <div class="quickview-toolbar-actions">
          <div class="quickview-nav" aria-label="Snapshot navigation">
            <button id="quickviewPrev" class="quickview-nav-btn" type="button" aria-label="Previous snapshot">&#8592;</button>
            <span id="quickviewCount" class="quickview-nav-count">- / -</span>
            <button id="quickviewNext" class="quickview-nav-btn" type="button" aria-label="Next snapshot">&#8594;</button>
          </div>
          <button id="quickviewClose" class="quickview-close" type="button">Close</button>
        </div>
      </div>
      <iframe id="quickviewFrame" class="quickview-frame" title="Armory Quickview"></iframe>
    </div>
  </div>

  <script>
    "use strict";

    const state = {
      index: null,
      characters: [],
      filteredCharacters: [],
      selectedCharacter: null,
      selectedArchive: null,
      snapshots: [],
      selectedSnapshot: null
    };

    const CLASS_TAG_MAP = {
      assassin: "Asn",
      amazon: "Ama",
      barbarian: "Barb",
      druid: "Druid",
      necromancer: "Necro",
      paladin: "Pal",
      sorceress: "Sorc"
    };

    const dom = {
      searchInput: document.getElementById("searchInput"),
      tagInput: document.getElementById("tagInput"),
      characterSort: document.getElementById("characterSort"),
      characterList: document.getElementById("characterList"),
      snapshotList: document.getElementById("snapshotList"),
      detailRoot: document.getElementById("detailRoot"),
      timelineHeader: document.getElementById("timelineHeader"),
      characterCount: document.getElementById("characterCount"),
      snapshotCount: document.getElementById("snapshotCount"),
      statusPill: document.getElementById("statusPill"),
      quickviewButton: document.getElementById("quickviewButton"),
      quickviewModal: document.getElementById("quickviewModal"),
      quickviewFrame: document.getElementById("quickviewFrame"),
      quickviewClose: document.getElementById("quickviewClose"),
      quickviewTitle: document.getElementById("quickviewTitle"),
      quickviewPrev: document.getElementById("quickviewPrev"),
      quickviewNext: document.getElementById("quickviewNext"),
      quickviewCount: document.getElementById("quickviewCount")
    };

    function normalizeArchivePayload(payload, fallbackCharacterName) {
      if (Array.isArray(payload)) {
        return {
          character: fallbackCharacterName,
          snapshots: payload
        };
      }

      if (payload && typeof payload === "object") {
        return {
          character: payload.character || fallbackCharacterName,
          snapshots: Array.isArray(payload.snapshots) ? payload.snapshots : []
        };
      }

      return {
        character: fallbackCharacterName,
        snapshots: []
      };
    }

    function readParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        character: params.get("c"),
        timestamp: params.get("t")
      };
    }

    function updateParams(character, key) {
      const params = new URLSearchParams(window.location.search);

      if (character) {
        params.set("c", character);
      } else {
        params.delete("c");
      }

      if (key) {
        params.set("t", key);
      } else {
        params.delete("t");
      }

      const query = params.toString();
      const next = query ? `?${query}` : window.location.pathname;
      window.history.replaceState({}, "", next);
    }

    function safeText(value, fallback = "-") {
      if (value === null || value === undefined || value === "") {
        return fallback;
      }
      return String(value);
    }

    function normalizeTags(rawValue) {
      if (Array.isArray(rawValue)) {
        return rawValue
          .map((tag) => String(tag || "").trim())
          .filter((tag) => tag.length > 0);
      }

      if (typeof rawValue === "string" && rawValue.trim()) {
        return rawValue
          .split(",")
          .map((tag) => tag.trim())
          .filter((tag) => tag.length > 0);
      }

      return [];
    }

    function dedupeTags(values) {
      const result = [];
      const seen = new Set();

      values.forEach((value) => {
        const tag = String(value || "").trim();
        if (!tag) {
          return;
        }

        const key = tag.toLowerCase();
        if (seen.has(key)) {
          return;
        }

        seen.add(key);
        result.push(tag);
      });

      return result;
    }

    function classToTag(className) {
      if (typeof className !== "string") {
        return "";
      }

      const normalized = className.trim().toLowerCase();
      return CLASS_TAG_MAP[normalized] || "";
    }

    function getAutomaticSnapshotTags(snapshot) {
      if (!snapshot || typeof snapshot !== "object") {
        return [];
      }

      const data = snapshot.data && typeof snapshot.data === "object"
        ? snapshot.data
        : {};

      const tags = [];
      const classTag = classToTag(data.Class);
      if (classTag) {
        tags.push(classTag);
      }

      if (data.IsHardcore === true) {
        tags.push("HC");
      }

      return dedupeTags(tags);
    }

    function getCharacterTags(character) {
      if (!character || typeof character !== "object") {
        return [];
      }

      const tags = [];
      tags.push(...normalizeTags(character.tags));

      const classTag = classToTag(character.class);
      if (classTag) {
        tags.push(classTag);
      }

      return dedupeTags(tags);
    }

    function getCharacterFilterTerm() {
      return dom.searchInput.value.trim().toLowerCase();
    }

    function getTagFilterTerm() {
      return dom.tagInput.value.trim().toLowerCase();
    }

    function getCharacterSortMode() {
      return dom.characterSort ? dom.characterSort.value : "default";
    }

    function slugify(value) {
      if (typeof value !== "string") {
        return "";
      }

      return value
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function getSnapshotKey(snapshot) {
      if (!snapshot || typeof snapshot !== "object") {
        return "";
      }

      const metadata = snapshot.metadata && typeof snapshot.metadata === "object"
        ? snapshot.metadata
        : {};

      if (typeof metadata.slug === "string" && metadata.slug.trim()) {
        return slugify(metadata.slug);
      }

      if (typeof metadata.title === "string" && metadata.title.trim()) {
        return slugify(metadata.title);
      }

      if (typeof snapshot.id === "string" && snapshot.id.trim()) {
        return snapshot.id.trim();
      }

      return typeof snapshot.timestamp === "string" ? snapshot.timestamp : "";
    }

    function formatDate(value) {
      if (!value) {
        return "Unknown";
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }

      return date.toLocaleString();
    }

    function summarizeChanges(snapshot) {
      const changes = snapshot && snapshot.changes ? snapshot.changes : {};
      const skillsUp = Array.isArray(changes.skills_added) ? changes.skills_added.length : 0;
      const skillsDown = Array.isArray(changes.skills_removed) ? changes.skills_removed.length : 0;
      const skillsDelta = Array.isArray(changes.skills_updated) ? changes.skills_updated.length : 0;
      const gearUp = Array.isArray(changes.equipped_added) ? changes.equipped_added.length : 0;
      const gearDown = Array.isArray(changes.equipped_removed) ? changes.equipped_removed.length : 0;

      if (skillsUp + skillsDown + skillsDelta + gearUp + gearDown === 0) {
        return "No tracked changes";
      }

      return `Skills +${skillsUp}/-${skillsDown}/d${skillsDelta} | Gear +${gearUp}/-${gearDown}`;
    }

    function toAbsoluteUrl(value) {
      if (typeof value !== "string" || !value.trim()) {
        return "";
      }

      try {
        return new URL(value, window.location.href).toString();
      } catch (_) {
        return "";
      }
    }

    function buildCharacterSharePath(characterName, key) {
      const params = new URLSearchParams();
      params.set("c", String(characterName || "").toLowerCase());

      if (key) {
        params.set("t", key);
      }

      return `character.html?${params.toString()}`;
    }

    function resolveSnapshotShareLinks(character, snapshot) {
      const links = Array.isArray(character && character.snapshotLinks) ? character.snapshotLinks : [];
      const snapshotKey = getSnapshotKey(snapshot);
      const snapshotTimestamp = snapshot && snapshot.timestamp ? String(snapshot.timestamp) : "";
      const snapshotId = snapshot && snapshot.id ? String(snapshot.id) : "";

      const matched = links.find((link) => {
        const key = link && typeof link.key === "string" ? link.key : "";
        const timestamp = link && typeof link.timestamp === "string" ? link.timestamp : "";
        const id = link && typeof link.id === "string" ? link.id : "";

        return key === snapshotKey || timestamp === snapshotTimestamp || (snapshotId && id === snapshotId);
      });

      const fallbackPath = buildCharacterSharePath(
        character && character.name,
        snapshotKey || snapshotTimestamp
      );

      return {
        shareUrl: toAbsoluteUrl(matched && matched.url ? matched.url : fallbackPath),
        canonicalUrl: toAbsoluteUrl(matched && matched.canonicalUrl ? matched.canonicalUrl : fallbackPath)
      };
    }

    function buildDashboardShareUrl(character, snapshot) {
      const url = new URL(window.location.href);
      const key = getSnapshotKey(snapshot) || (snapshot && snapshot.timestamp ? snapshot.timestamp : "");

      if (character && character.name) {
        url.searchParams.set("c", character.name);
      }

      if (key) {
        url.searchParams.set("t", key);
      }

      return url.toString();
    }

    function getArmoryQuickviewUrl() {
      if (!state.selectedCharacter || !state.selectedSnapshot) {
        return "";
      }

      const links = resolveSnapshotShareLinks(state.selectedCharacter, state.selectedSnapshot);
      return links.shareUrl || links.canonicalUrl || "";
    }

    function syncQuickviewButtonState() {
      const hasSelection = Boolean(state.selectedCharacter && state.selectedSnapshot);
      if (dom.quickviewButton) {
        dom.quickviewButton.disabled = !hasSelection;
      }
      syncQuickviewNavigationState();
    }

    function getSelectedSnapshotIndex() {
      const visibleSnapshots = getVisibleSnapshots();
      if (!visibleSnapshots.length || !state.selectedSnapshot) {
        return { index: -1, total: visibleSnapshots.length };
      }

      const selectedKey = getSnapshotKey(state.selectedSnapshot);
      const index = visibleSnapshots.findIndex((snapshot) => {
        const key = getSnapshotKey(snapshot);
        return key === selectedKey || snapshot.timestamp === state.selectedSnapshot.timestamp;
      });

      return { index, total: visibleSnapshots.length };
    }

    function syncQuickviewNavigationState() {
      const position = getSelectedSnapshotIndex();
      const hasSelection = position.index >= 0;

      if (dom.quickviewCount) {
        dom.quickviewCount.textContent = hasSelection
          ? `${position.index + 1} / ${position.total}`
          : "- / -";
      }

      if (dom.quickviewPrev) {
        dom.quickviewPrev.disabled = !hasSelection || position.index <= 0;
      }

      if (dom.quickviewNext) {
        dom.quickviewNext.disabled = !hasSelection || position.index >= position.total - 1;
      }
    }

    function moveQuickviewSnapshot(step) {
      const visibleSnapshots = getVisibleSnapshots();
      if (!visibleSnapshots.length || !state.selectedSnapshot) {
        return;
      }

      const position = getSelectedSnapshotIndex();
      if (position.index < 0) {
        return;
      }

      const nextIndex = position.index + step;
      if (nextIndex < 0 || nextIndex >= visibleSnapshots.length) {
        return;
      }

      const nextSnapshot = visibleSnapshots[nextIndex];
      selectSnapshotByKey(getSnapshotKey(nextSnapshot));
    }

    function closeQuickview() {
      dom.quickviewModal.classList.remove("open");
      dom.quickviewModal.setAttribute("aria-hidden", "true");
      dom.quickviewFrame.src = "about:blank";
      syncQuickviewNavigationState();
    }

    function openQuickview() {
      const url = getArmoryQuickviewUrl();
      if (!url) {
        return;
      }

      const labelName = safeText(state.selectedCharacter && state.selectedCharacter.name, "Unknown");
      const labelTime = safeText(state.selectedSnapshot && state.selectedSnapshot.timestamp, "Unknown");
      dom.quickviewTitle.textContent = `Armory Quickview - ${labelName} @ ${labelTime}`;
      dom.quickviewFrame.src = url;
      dom.quickviewModal.classList.add("open");
      dom.quickviewModal.setAttribute("aria-hidden", "false");
      syncQuickviewNavigationState();
    }

    function getCharacterLevel(character) {
      if (character && typeof character.level !== "undefined" && character.level !== null) {
        return character.level;
      }
      return "?";
    }

    function linkMatchesTag(link, term) {
      if (!term) {
        return true;
      }

      return normalizeTags(link && link.tags).some((tag) => tag.toLowerCase().includes(term));
    }

    function characterMatchesTag(character, term) {
      if (!term) {
        return true;
      }

      if (getCharacterTags(character).some((tag) => tag.toLowerCase().includes(term))) {
        return true;
      }

      const links = Array.isArray(character && character.snapshotLinks) ? character.snapshotLinks : [];
      return links.some((link) => linkMatchesTag(link, term));
    }

    function snapshotMatchesTag(snapshot, term) {
      if (!term) {
        return true;
      }

      const metadata = snapshot && snapshot.metadata && typeof snapshot.metadata === "object"
        ? snapshot.metadata
        : {};

      const mergedTags = dedupeTags([
        ...normalizeTags(metadata.tags),
        ...getAutomaticSnapshotTags(snapshot)
      ]);

      return mergedTags.some((tag) => tag.toLowerCase().includes(term));
    }

    function getVisibleSnapshots() {
      const tagTerm = getTagFilterTerm();
      return state.snapshots.filter((snapshot) => snapshotMatchesTag(snapshot, tagTerm));
    }

    function ensureSelectedSnapshotVisible() {
      const visibleSnapshots = getVisibleSnapshots();

      if (!visibleSnapshots.length) {
        state.selectedSnapshot = null;
        return;
      }

      if (!state.selectedSnapshot) {
        state.selectedSnapshot = visibleSnapshots[0];
        return;
      }

      const currentKey = getSnapshotKey(state.selectedSnapshot);
      const visibleSelection = visibleSnapshots.find((snapshot) => {
        const key = getSnapshotKey(snapshot);
        return key === currentKey || snapshot.timestamp === state.selectedSnapshot.timestamp;
      });

      state.selectedSnapshot = visibleSelection || visibleSnapshots[0];
    }

    function applyCharacterFilter() {
      const term = getCharacterFilterTerm();
      const tagTerm = getTagFilterTerm();
      state.filteredCharacters = state.characters.filter((char) => {
        const name = (char.name || "").toLowerCase();
        return name.includes(term) && characterMatchesTag(char, tagTerm);
      });

      const sortMode = getCharacterSortMode();

      if (sortMode === "snapshots") {
        state.filteredCharacters.sort((a, b) => {
          const aCount = Number(a && a.snapshotCount ? a.snapshotCount : 0);
          const bCount = Number(b && b.snapshotCount ? b.snapshotCount : 0);

          if (bCount !== aCount) {
            return bCount - aCount;
          }

          return String(a && a.name ? a.name : "").localeCompare(String(b && b.name ? b.name : ""));
        });
        return;
      }

      if (sortMode === "updated") {
        state.filteredCharacters.sort((a, b) => {
          const aTime = String(a && a.lastUpdated ? a.lastUpdated : "");
          const bTime = String(b && b.lastUpdated ? b.lastUpdated : "");

          if (bTime !== aTime) {
            return bTime.localeCompare(aTime);
          }

          return String(a && a.name ? a.name : "").localeCompare(String(b && b.name ? b.name : ""));
        });
        return;
      }

      if (sortMode === "alpha") {
        state.filteredCharacters.sort((a, b) => {
          return String(a && a.name ? a.name : "").localeCompare(String(b && b.name ? b.name : ""));
        });
      }
    }

    function renderCharacterList() {
      dom.characterList.innerHTML = "";
      dom.characterCount.textContent = String(state.filteredCharacters.length);

      if (state.filteredCharacters.length === 0) {
        const item = document.createElement("li");
        item.className = "message";
        item.textContent = "No character matches this filter.";
        dom.characterList.appendChild(item);
        return;
      }

      const fragment = document.createDocumentFragment();

      state.filteredCharacters.forEach((character) => {
        const li = document.createElement("li");
        const button = document.createElement("button");
        button.type = "button";
        button.className = "character-row";

        if (state.selectedCharacter && state.selectedCharacter.name === character.name) {
          button.classList.add("active");
        }

        const className = safeText(character.class, "Unknown Class");
        const level = getCharacterLevel(character);
        const updated = formatDate(character.lastUpdated);

        button.innerHTML = `
          <div class="name-line">
            <span>${safeText(character.name, "Unknown")}</span>
            <span class="muted">Lv ${level}</span>
          </div>
          <div class="snapshot-meta">
            <span>${className}</span>
            <span>Snapshots: ${safeText(character.snapshotCount, 0)}</span>
            <span>Updated: ${updated}</span>
          </div>
        `;

        button.addEventListener("click", () => {
          void selectCharacter(character.name);
        });

        li.appendChild(button);
        fragment.appendChild(li);
      });

      dom.characterList.appendChild(fragment);
    }

    function renderSnapshotList() {
      dom.snapshotList.innerHTML = "";
      const visibleSnapshots = getVisibleSnapshots();
      const tagTerm = getTagFilterTerm();
      dom.snapshotCount.textContent = String(visibleSnapshots.length);

      if (!state.selectedCharacter) {
        dom.timelineHeader.innerHTML = '<div class="muted">Select a character to browse snapshots.</div>';
        return;
      }

      dom.timelineHeader.innerHTML = `
        <div class="name-line">
          <span>${safeText(state.selectedCharacter.name)}</span>
          <span class="muted">${safeText(state.selectedCharacter.class, "Unknown")}</span>
        </div>
        <div class="snapshot-meta">
          <span>Latest: ${formatDate(state.selectedCharacter.lastUpdated)}</span>
          ${tagTerm ? `<span>Tag: ${safeText(dom.tagInput.value.trim())}</span>` : ""}
        </div>
      `;

      if (visibleSnapshots.length === 0) {
        const empty = document.createElement("li");
        empty.className = "message";
        empty.textContent = tagTerm
          ? "No snapshots match this tag filter for this character."
          : "No snapshots found for this character.";
        dom.snapshotList.appendChild(empty);
        return;
      }

      const fragment = document.createDocumentFragment();

      visibleSnapshots.forEach((snapshot) => {
        const li = document.createElement("li");
        const button = document.createElement("button");
        button.type = "button";
        button.className = "snapshot-row";

        if (state.selectedSnapshot && state.selectedSnapshot.timestamp === snapshot.timestamp) {
          button.classList.add("active");
        }

        const level = snapshot && snapshot.data && snapshot.data.Stats ? snapshot.data.Stats.Level : "?";
        const label = snapshot.metadata && snapshot.metadata.automatic === false ? "Milestone" : "Auto";

        button.innerHTML = `
          <div class="name-line">
            <span>${formatDate(snapshot.timestamp)}</span>
            <span class="muted">Lv ${safeText(level)}</span>
          </div>
          <div class="snapshot-meta">
            <span>${label}</span>
            <span>${summarizeChanges(snapshot)}</span>
          </div>
        `;

        button.addEventListener("click", () => {
          selectSnapshotByKey(getSnapshotKey(snapshot));
        });

        li.appendChild(button);
        fragment.appendChild(li);
      });

      dom.snapshotList.appendChild(fragment);
    }

    function getSkillRows(snapshot) {
      const data = snapshot && snapshot.data ? snapshot.data : {};
      const tabs = Array.isArray(data.SkillTabs) ? data.SkillTabs : [];
      const rows = [];

      tabs.forEach((tab) => {
        const skills = Array.isArray(tab.Skills) ? tab.Skills : [];
        skills.forEach((skill) => {
          if (!skill || typeof skill !== "object") {
            return;
          }
          rows.push({
            name: skill.Name || "Unknown",
            level: typeof skill.Level === "number" ? skill.Level : skill.Level || "?",
            tab: tab.Name || ""
          });
        });
      });

      rows.sort((a, b) => Number(b.level) - Number(a.level));
      return rows.slice(0, 12);
    }

    function getGearTitles(snapshot) {
      const data = snapshot && snapshot.data ? snapshot.data : {};
      const equipped = Array.isArray(data.Equipped) ? data.Equipped : [];

      return equipped
        .filter((item) => item && typeof item === "object")
        .map((item) => ({
          worn: item.Worn || "slot",
          title: item.Title || "Unknown item"
        }))
        .sort((a, b) => a.worn.localeCompare(b.worn));
    }

    function renderSnapshotDetail() {
      if (!state.selectedSnapshot) {
        dom.detailRoot.innerHTML = '<div class="message">Select a snapshot from the timeline.</div>';
        dom.statusPill.textContent = "Idle";
        syncQuickviewButtonState();
        return;
      }

      const snapshot = state.selectedSnapshot;
      const data = snapshot.data || {};
      const stats = data.Stats || {};
      const bonus = data.Bonus || {};
      const metadata = snapshot.metadata || {};
      const changes = snapshot.changes || {};
      const shareLinks = resolveSnapshotShareLinks(state.selectedCharacter, snapshot);
      const dashboardShareUrl = buildDashboardShareUrl(state.selectedCharacter, snapshot);
      const snapshotTags = dedupeTags([
        ...normalizeTags(metadata.tags),
        ...getAutomaticSnapshotTags(snapshot)
      ]);

      const changeChips = [];

      const addedSkills = Array.isArray(changes.skills_added) ? changes.skills_added.length : 0;
      const removedSkills = Array.isArray(changes.skills_removed) ? changes.skills_removed.length : 0;
      const updatedSkills = Array.isArray(changes.skills_updated) ? changes.skills_updated.length : 0;
      const addedGear = Array.isArray(changes.equipped_added) ? changes.equipped_added.length : 0;
      const removedGear = Array.isArray(changes.equipped_removed) ? changes.equipped_removed.length : 0;

      if (addedSkills > 0) {
        changeChips.push(`<span class="change-chip good">+${addedSkills} new skills</span>`);
      }
      if (removedSkills > 0) {
        changeChips.push(`<span class="change-chip bad">-${removedSkills} removed skills</span>`);
      }
      if (updatedSkills > 0) {
        changeChips.push(`<span class="change-chip">${updatedSkills} skill level updates</span>`);
      }
      if (addedGear > 0) {
        changeChips.push(`<span class="change-chip good">+${addedGear} gear changes in</span>`);
      }
      if (removedGear > 0) {
        changeChips.push(`<span class="change-chip bad">-${removedGear} gear changes out</span>`);
      }
      if (changeChips.length === 0) {
        changeChips.push('<span class="change-chip">No tracked changes</span>');
      }

      const skills = getSkillRows(snapshot);
      const gear = getGearTitles(snapshot);

      const skillsHtml = skills.length
        ? skills.map((row) => `<li class="stat-row"><span>${row.name}</span><span>${safeText(row.level)} (${safeText(row.tab, "-")})</span></li>`).join("")
        : "<li class=\"muted\">No skill data.</li>";

      const gearHtml = gear.length
        ? gear.map((item) => `<li class="stat-row"><span>${safeText(item.worn)}</span><span>${safeText(item.title)}</span></li>`).join("")
        : "<li class=\"muted\">No equipment data.</li>";

      dom.detailRoot.innerHTML = `
        <div class="hero">
          <h1>${safeText(data.Name, safeText(state.selectedCharacter && state.selectedCharacter.name))}</h1>
          <small>${formatDate(snapshot.timestamp)}</small>
        </div>

        <div class="kpi-grid">
          <div class="kpi"><span class="label">Class</span><span class="value">${safeText(data.Class)}</span></div>
          <div class="kpi"><span class="label">Level</span><span class="value">${safeText(stats.Level, "?")}</span></div>
          <div class="kpi"><span class="label">Life / Mana</span><span class="value">${safeText(stats.Life, "?")} / ${safeText(stats.Mana, "?")}</span></div>
          <div class="kpi"><span class="label">Snapshot Type</span><span class="value">${metadata.automatic === false ? "Milestone" : "Automatic"}</span></div>
        </div>

        <div style="margin-bottom: 12px;">${changeChips.join("")}</div>

        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
          <span class="badge">Hardcore: ${data.IsHardcore ? "Yes" : "No"}</span>
          <span class="badge">Ladder: ${data.IsLadder ? "Yes" : "No"}</span>
          <span class="badge">Dead: ${data.IsDead ? "Yes" : "No"}</span>
          <span class="badge">Favorite: ${metadata.favorite ? "Yes" : "No"}</span>
        </div>

        <div class="grid">
          <article class="card">
            <h3>Notes</h3>
            <ul class="flat-list">
              <li><strong>Title:</strong> ${safeText(metadata.title, "(none)")}</li>
              <li><strong>Description:</strong> ${safeText(metadata.description, "(none)")}</li>
              <li><strong>Journal:</strong> ${safeText(metadata.journal, "(none)")}</li>
              <li><strong>Tags:</strong> ${snapshotTags.length ? snapshotTags.join(", ") : "(none)"}</li>
              <li><strong>Story:</strong> ${metadata.story ? "Yes" : "No"}</li>
            </ul>
          </article>

          <article class="card">
            <h3>Sharing URLs</h3>
            <ul class="share-list">
              <li>
                <div class="share-label">Shareable Archive Armory link</div>
                <a class="share-url" href="${shareLinks.shareUrl}" target="_blank" rel="noopener noreferrer">${shareLinks.shareUrl}</a>
              </li>
              <li>
                <div class="share-label">Dashboard link</div>
                <a class="share-url" href="${dashboardShareUrl}" target="_blank" rel="noopener noreferrer">${dashboardShareUrl}</a>
              </li>
<!--              <li>
                <div class="share-label">Canonical viewer link</div>
                <a class="share-url" href="${shareLinks.canonicalUrl}" target="_blank" rel="noopener noreferrer">${shareLinks.canonicalUrl}</a>
              </li> --> 
            </ul>
          </article>

          <article class="card">
            <h3>Attributes</h3>
            <ul class="stat-list">
              <li class="stat-row"><span>Strength</span><span>${safeText(stats.Strength, "?")} (+${safeText(bonus.Strength, 0)})</span></li>
              <li class="stat-row"><span>Dexterity</span><span>${safeText(stats.Dexterity, "?")} (+${safeText(bonus.Dexterity, 0)})</span></li>
              <li class="stat-row"><span>Vitality</span><span>${safeText(stats.Vitality, "?")} (+${safeText(bonus.Vitality, 0)})</span></li>
              <li class="stat-row"><span>Energy</span><span>${safeText(stats.Energy, "?")} (+${safeText(bonus.Energy, 0)})</span></li>
            </ul>
          </article>

          <article class="card">
            <h3>Resistances</h3>
            <ul class="stat-list">
              <li class="stat-row"><span>Fire</span><span>${safeText(bonus.FireResistance, 0)}%</span></li>
              <li class="stat-row"><span>Cold</span><span>${safeText(bonus.ColdResistance, 0)}%</span></li>
              <li class="stat-row"><span>Lightning</span><span>${safeText(bonus.LightningResistance, 0)}%</span></li>
              <li class="stat-row"><span>Poison</span><span>${safeText(bonus.PoisonResistance, 0)}%</span></li>
            </ul>
          </article>

          <article class="card">
            <h3>Top Skills</h3>
            <ul class="flat-list">${skillsHtml}</ul>
          </article>

          <article class="card">
            <h3>Equipped Titles</h3>
            <ul class="flat-list">${gearHtml}</ul>
          </article>
        </div>
      `;

      dom.statusPill.textContent = metadata.automatic === false ? "Milestone" : "Snapshot";
      syncQuickviewButtonState();
    }

    function selectSnapshotByKey(key) {
      const snap = getVisibleSnapshots().find((item) => {
        const snapshotKey = getSnapshotKey(item);
        return snapshotKey === key || item.timestamp === key;
      });
      if (!snap) {
        return;
      }

      state.selectedSnapshot = snap;
      renderSnapshotList();
      renderSnapshotDetail();
      updateParams(
        state.selectedCharacter ? state.selectedCharacter.name : null,
        getSnapshotKey(snap)
      );

      if (dom.quickviewModal.classList.contains("open")) {
        openQuickview();
      }
    }

    async function selectCharacter(characterName) {
      const character = state.characters.find((item) => item.name === characterName);
      if (!character) {
        return;
      }

      closeQuickview();

      state.selectedCharacter = character;
      state.selectedSnapshot = null;
      state.snapshots = [];
      renderCharacterList();
      renderSnapshotList();
      renderSnapshotDetail();
      dom.statusPill.textContent = "Loading";

      try {
        const response = await fetch(`./snapshots/${character.name.toLowerCase()}.json`, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const payload = await response.json();
        const archive = normalizeArchivePayload(payload, character.name);

        state.selectedArchive = archive;
        state.snapshots = archive.snapshots
          .slice()
          .sort((a, b) => String(b.timestamp || "").localeCompare(String(a.timestamp || "")));

        const params = readParams();
        const visibleSnapshots = getVisibleSnapshots();
        const byUrl = params.timestamp
          ? visibleSnapshots.find((item) => {
              const snapshotKey = getSnapshotKey(item);
              return snapshotKey === params.timestamp || item.timestamp === params.timestamp;
            })
          : null;

        if (byUrl) {
          state.selectedSnapshot = byUrl;
        } else {
          state.selectedSnapshot = visibleSnapshots[0] || null;
        }

        renderSnapshotList();
        renderSnapshotDetail();

        updateParams(
          character.name,
          state.selectedSnapshot ? getSnapshotKey(state.selectedSnapshot) : null
        );
      } catch (error) {
        dom.snapshotList.innerHTML = "<li class=\"message\">Unable to load snapshot file for this character.</li>";
        dom.detailRoot.innerHTML = `<div class=\"message\">Load error: ${safeText(error && error.message ? error.message : "unknown")}</div>`;
        dom.statusPill.textContent = "Error";
      }
    }

    async function handleFiltersChanged() {
      applyCharacterFilter();

      if (state.filteredCharacters.length === 0) {
        closeQuickview();
        state.selectedCharacter = null;
        state.selectedArchive = null;
        state.snapshots = [];
        state.selectedSnapshot = null;
        renderCharacterList();
        renderSnapshotList();
        renderSnapshotDetail();
        updateParams(null, null);
        dom.statusPill.textContent = "Ready";
        return;
      }

      const selectedVisible = state.selectedCharacter
        ? state.filteredCharacters.some((character) => character.name === state.selectedCharacter.name)
        : false;

      if (!selectedVisible) {
        await selectCharacter(state.filteredCharacters[0].name);
        return;
      }

      ensureSelectedSnapshotVisible();
      renderCharacterList();
      renderSnapshotList();
      renderSnapshotDetail();
      updateParams(
        state.selectedCharacter ? state.selectedCharacter.name : null,
        state.selectedSnapshot ? getSnapshotKey(state.selectedSnapshot) : null
      );
    }

    function bindEvents() {
      dom.searchInput.addEventListener("input", () => {
        void handleFiltersChanged();
      });
      dom.tagInput.addEventListener("input", () => {
        void handleFiltersChanged();
      });
      dom.characterSort.addEventListener("change", () => {
        void handleFiltersChanged();
      });
      dom.quickviewButton.addEventListener("click", () => {
        openQuickview();
      });
      dom.quickviewPrev.addEventListener("click", () => {
        moveQuickviewSnapshot(-1);
      });
      dom.quickviewNext.addEventListener("click", () => {
        moveQuickviewSnapshot(1);
      });
      dom.quickviewClose.addEventListener("click", () => {
        closeQuickview();
      });
      dom.quickviewModal.addEventListener("click", (event) => {
        if (event.target === dom.quickviewModal) {
          closeQuickview();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && dom.quickviewModal.classList.contains("open")) {
          closeQuickview();
          return;
        }

        if (!dom.quickviewModal.classList.contains("open")) {
          return;
        }

        if (event.key === "ArrowLeft") {
          moveQuickviewSnapshot(-1);
          return;
        }

        if (event.key === "ArrowRight") {
          moveQuickviewSnapshot(1);
        }
      });
    }

    async function boot() {
      bindEvents();
      dom.statusPill.textContent = "Loading";

      try {
        const response = await fetch("./index.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        state.index = await response.json();
        const characters = Array.isArray(state.index.characters) ? state.index.characters.slice() : [];

        characters.sort((a, b) => {
          const aTime = String(a && a.lastUpdated ? a.lastUpdated : "");
          const bTime = String(b && b.lastUpdated ? b.lastUpdated : "");
          return bTime.localeCompare(aTime);
        });

        state.characters = characters;
        applyCharacterFilter();
        renderCharacterList();

        const params = readParams();
        const fromUrl = params.character
          ? state.characters.find((item) => item.name.toLowerCase() === params.character.toLowerCase())
          : null;

        if (fromUrl) {
          await selectCharacter(fromUrl.name);
        } else if (state.characters[0]) {
          await selectCharacter(state.characters[0].name);
        } else {
          dom.statusPill.textContent = "Ready";
        }
      } catch (error) {
        dom.detailRoot.innerHTML = `<div class=\"message\">Unable to load index.json: ${safeText(error && error.message ? error.message : "unknown")}</div>`;
        dom.statusPill.textContent = "Error";
      }
    }

    void boot();
  </script>
</body>
</html>
