<script>
// --- Wayback Machine Search Logic ---

$(document).ready(function() {
    console.log("(document).ready worked");

    // Extract character name from URL if available
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    // Simple, non-secure "admin" view toggle so the
    // recently-changed dropdown is hidden for most users.
    // Usage examples:
    //   wayback.html?admin=1
    //   wayback.html?c=SomeChar&t=1234&admin=1
    //   wayback.html#admin
    const isAdminView = getQueryParam("admin") === "1" || window.location.hash === "#admin";
    if (isAdminView) {
        const wrapper = document.getElementById("recentlyChangedWrapper");
        if (wrapper) {
            wrapper.style.display = "block";
        }
    }

    let characterName = getQueryParam("charName");

    if (characterName) {
        console.log("Character Name from URL:", characterName);
        
        // Fetch character data and process it
        try {
            fetchCharacterData(characterName);
        } catch (error) {
            console.error("Error during API calls:", error);
        }
    } else {
        console.warn("Character Name is not set in the URL.");
//        document.getElementById("alertBanner").style.display = "block";
    }

    // Scroll event listeners
    $(window).scroll(function() {
        const scroll = $(window).scrollTop();
        $('.arrow').toggleClass('fade', scroll >= 1);
    });

    $('#main').scroll(function() {
        const scroll = $('#main').scrollTop();
        $('.arrow').toggleClass('fade', scroll >= 1);
    });

    $('#characterSearchButton').on('click', function() {
        $("#hover-container-weapon1").empty();
        $("#hover-container-helmet").empty();
        $("#hover-container-amulet").empty();
        $("#hover-container-ring1").empty();
        $("#hover-container-ring2").empty();
        $("#hover-container-body").empty();
        $("#hover-container-belt").empty();
        $("#hover-container-gloves").empty();
        $("#hover-container-boots").empty();
        $("#hover-container-weapon2").empty();
//        $("#hover-container-charms").empty();
        $("#merc-hover-container-weapon1").empty();
        $("#merc-hover-container-helmet").empty();
        $("#merc-hover-container-body").empty();
        $("#merc-hover-container-weapon2").empty();    

        const name = $('#characterSearchInput').val().trim();
        if (!name) {
            $('#snapshotList').html('<div style="color:#c00">Please enter a character name.</div>');
            return;
        }
        // Always fetch using lowercase name
        const lowerName = name.toLowerCase();
        fetch(`./snapshots/${lowerName}.json`)
            .then(resp => {
                if (!resp.ok) throw new Error('Not found');
                return resp.json();
            })
            .then(history => {
                if (!Array.isArray(history) || history.length === 0) {
                    $('#snapshotList').html('<div style="color:#c00">No snapshots found for <b>' + name + '</b>.</div>');
                    return;
                }
                // List snapshots, sorted newest to oldest
                const snapshots = history.slice().sort((a, b) => b.timestamp.localeCompare(a.timestamp));
                let html = '<div>Snapshots for <b>' + name + '</b>:</div><ul style="margin-top:8px">';
                const params = new URLSearchParams(window.location.search);
                const snapshotTime = params.get('t');
                snapshots.forEach((snap, idx) => {
                    const active = snap.timestamp === snapshotTime ? ' active' : '';
                    const olderSnap = snapshots[idx + 1] || null;
                    html += `<li><button class="snapshot-btn${active}" data-timestamp="${snap.timestamp}" data-name="${name}">${formatSnapshotLabel(snap, olderSnap)}</button></li>`;
                });
                html += '</ul>';
                $('#snapshotList').html(html);
                if (snapshots.length > 0) {
                    // Automatically load the most recent snapshot
                    const firstTimestamp = snapshots[0].timestamp;
                    const firstName = name;
                    $('#snapshotList .snapshot-btn').first().trigger('click');
                    // loadSnapshot(firstTimestamp, firstName);
                }
            })
            .catch(() => {
                $('#snapshotList').html('<div style="color:#c00">No snapshots found for <b>' + name + '</b>.</div>');
            });
    });

    // Format how each snapshot appears in the list without changing
    // the underlying timestamp value used for sorting and URLs.
    function formatSnapshotLabel(snap, olderSnap) {
        const rawTs = (snap && typeof snap.timestamp === 'string') ? snap.timestamp : '';

        // Shorten timestamp: keep date + minutes, swap 'T' for space.
        let displayTime = rawTs;
        if (rawTs.length >= 16) {
            displayTime = rawTs.substring(0, 16).replace('T', ' ');
        }

        // Pull character level from snapshot data if present.
        let levelPrefix = '';
        if (snap && snap.data && snap.data.Stats && typeof snap.data.Stats.Level !== 'undefined') {
            levelPrefix = `Lv ${snap.data.Stats.Level} - `; // en dash
        }

        const summary = getSnapshotChangeSummary(snap, olderSnap);
        if (!summary) {
            return levelPrefix + displayTime;
        }

        return `${levelPrefix}${displayTime}<br><span style="font-size:0.82em;color:#ddd;">${summary}</span>`;
    }

    function extractSkillsMap(data) {
        const skills = {};
        const tabs = data && Array.isArray(data.SkillTabs) ? data.SkillTabs : [];
        tabs.forEach(tab => {
            const tabSkills = tab && Array.isArray(tab.Skills) ? tab.Skills : [];
            tabSkills.forEach(skill => {
                if (!skill || typeof skill !== 'object') return;
                const name = skill.Name;
                const level = skill.Level;
                if (typeof name === 'string' && typeof level !== 'undefined') {
                    skills[name] = level;
                }
            });
        });
        return skills;
    }

    function extractEquippedTitles(data) {
        const equipped = data && Array.isArray(data.Equipped) ? data.Equipped : [];
        return equipped
            .filter(item => item && typeof item === 'object' && typeof item.Title === 'string')
            .map(item => item.Title)
            .sort();
    }

    function countDiff(newList, oldList) {
        const newCounts = {};
        const oldCounts = {};
        newList.forEach(v => { newCounts[v] = (newCounts[v] || 0) + 1; });
        oldList.forEach(v => { oldCounts[v] = (oldCounts[v] || 0) + 1; });

        let added = 0;
        let removed = 0;
        const keys = new Set([...Object.keys(newCounts), ...Object.keys(oldCounts)]);
        keys.forEach(k => {
            const delta = (newCounts[k] || 0) - (oldCounts[k] || 0);
            if (delta > 0) added += delta;
            if (delta < 0) removed += -delta;
        });

        return { added, removed };
    }

    function getSnapshotChangeSummary(snap, olderSnap) {
        if (!snap || typeof snap !== 'object') return '';

        const hasPrecomputed = (
            Array.isArray(snap.skills_added) ||
            Array.isArray(snap.skills_removed) ||
            Array.isArray(snap.skills_updated) ||
            Array.isArray(snap.equipped_added) ||
            Array.isArray(snap.equipped_removed)
        );

        let skillsAdded = 0;
        let skillsRemoved = 0;
        let skillsUpdated = 0;
        let equippedAdded = 0;
        let equippedRemoved = 0;

        if (hasPrecomputed) {
            skillsAdded = Array.isArray(snap.skills_added) ? snap.skills_added.length : 0;
            skillsRemoved = Array.isArray(snap.skills_removed) ? snap.skills_removed.length : 0;
            skillsUpdated = Array.isArray(snap.skills_updated) ? snap.skills_updated.length : 0;
            equippedAdded = Array.isArray(snap.equipped_added) ? snap.equipped_added.length : 0;
            equippedRemoved = Array.isArray(snap.equipped_removed) ? snap.equipped_removed.length : 0;
        } else if (olderSnap && snap.data && olderSnap.data) {
            const newSkills = extractSkillsMap(snap.data);
            const oldSkills = extractSkillsMap(olderSnap.data);

            const newSkillNames = new Set(Object.keys(newSkills));
            const oldSkillNames = new Set(Object.keys(oldSkills));
            oldSkillNames.forEach(name => {
                if (!newSkillNames.has(name)) skillsRemoved += 1;
            });
            newSkillNames.forEach(name => {
                if (!oldSkillNames.has(name)) {
                    skillsAdded += 1;
                } else if (newSkills[name] !== oldSkills[name]) {
                    skillsUpdated += 1;
                }
            });

            const equipDiff = countDiff(
                extractEquippedTitles(snap.data),
                extractEquippedTitles(olderSnap.data)
            );
            equippedAdded = equipDiff.added;
            equippedRemoved = equipDiff.removed;
        }

        const hasSkillDiff = skillsAdded || skillsRemoved || skillsUpdated;
        const hasEquipDiff = equippedAdded || equippedRemoved;
        if (!hasSkillDiff && !hasEquipDiff) {
            return '';
        }

        const parts = [];
        if (hasSkillDiff) {
            parts.push(`Skills +${skillsAdded} -${skillsRemoved} Δ${skillsUpdated}`);
        }
        if (hasEquipDiff) {
            parts.push(`Gear +${equippedAdded} -${equippedRemoved}`);
        }
        return parts.join(' | ');
    }

    // Handle snapshot selection
    $('#snapshotList').on('click', '.snapshot-btn', function() {
        const timestamp = $(this).data('timestamp');
        const name = $(this).data('name');
        // Highlight the selected snapshot button
        $('#snapshotList .snapshot-btn').removeClass('active');
        $(this).addClass('active');
        // Update URL
        const params = new URLSearchParams(window.location.search);
        params.set('c', name);
        params.set('t', timestamp);
        const newUrl = window.location.pathname + '?' + params.toString();
        window.history.pushState({}, '', newUrl);
        // Fetch the per-character file and display the selected snapshot (always lowercase)
        fetch(`./snapshots/${name.toLowerCase()}.json`)
            .then(resp => {
                if (!resp.ok) throw new Error('Not found');
                return resp.json();
            })
            .then(history => {
                const snap = history.find(s => s.timestamp === timestamp);
                if (!snap) {
                    $('#main .scroll').html('<div style="color:#c00">Snapshot not found.</div>');
                    return;
                }
                processCharacterData(snap.data);
            })
            .catch(() => {
                $('#main .scroll').html('<div style="color:#c00">Error loading snapshot file.</div>');
            });
    });
    // On page load, check for ?c= and ?t= params and auto-load snapshot if present
    (function() {
        const params = new URLSearchParams(window.location.search);
        const charName = params.get('c');
        const timestamp = params.get('t');
        if (charName && timestamp) {
            // Fill search box
            $('#characterSearchInput').val(charName);
            // Fetch and display snapshot list for this character
            fetch(`./snapshots/${charName.toLowerCase()}.json`)
                .then(resp => resp.json())
                .then(history => {
                    if (!Array.isArray(history) || history.length === 0) return;
                    const snapshots = history.slice().sort((a, b) => b.timestamp.localeCompare(a.timestamp));
                    let html = '<div>Snapshots for <b>' + charName + '</b>:</div><ul style="margin-top:8px">';
                    snapshots.forEach((snap, idx) => {
                        const active = snap.timestamp === timestamp ? ' active' : '';
                        const olderSnap = snapshots[idx + 1] || null;
                        html += `<li><button class="snapshot-btn${active}" data-timestamp="${snap.timestamp}" data-name="${charName}">${formatSnapshotLabel(snap, olderSnap)}</button></li>`;
                    });
                    html += '</ul>';
                    $('#snapshotList').html(html);
                    // Display the selected snapshot
                    const snap = history.find(s => s.timestamp === timestamp);
                    if (snap) processCharacterData(snap.data);
                });
        }
    })();

document.addEventListener("DOMContentLoaded", function() {
    initializeCharacterSections();


});

function initializeCharacterSections() {
    const characterSections = document.querySelectorAll(".character-section");

    characterSections.forEach(section => {
        const characterName = section.getAttribute("data-character-name");
        console.log("Initializing character:", characterName);

        if (characterName) {
            fetchCharacterData(characterName);
        } else {
            console.warn("Character Name is not set in the configuration for a section.");
            section.querySelector("#alertBanner").style.display = "block";
        }
    });
}

async function fetchCharacterData(characterName) {
    const url = `https://beta.pathofdiablo.com/api/characters/${encodeURIComponent(characterName)}/summary`;

    try {
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`API call failed with status: ${response.status}`);
        }
        const data = await response.json();
        processCharacterData(data);
    } catch (error) {
        console.error("Error fetching character data:", error);
    }
}

fetch('recently_changed.json')
    .then(response => response.json())
    .then(names => {
        const dropdown = document.getElementById('recentlyChangedDropdown');
        // Remove placeholder if there are names
        if (names.length > 0) {
            dropdown.innerHTML = '<option disabled selected>Recently Changed...</option>';
            names.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                dropdown.appendChild(opt);
            });
        }
        // Add event listener to load character on change
        dropdown.addEventListener('change', function() {
            const selected = dropdown.value;
            if (selected && selected !== 'Recently Changed...') {
                // Fill the search box
                const searchInput = document.getElementById('characterSearchInput');
                searchInput.value = selected;

                const newUrl = window.location.pathname + '?' + params.toString();
                window.history.replaceState({}, '', newUrl);
                // Trigger the search button click
                document.getElementById('characterSearchButton').click();
            }
        });
    });

function findWornItems(equippedItems) {
    var result = {};
    equippedItems.forEach((item) => {
      if(item["Worn"] !== "") {
        result[item["Worn"]] = item;
      }
    })
    return result;
}
  
function createItemHTML(itemObject) {
    let itemStr = "";

    // Title with special handling for "Delerium"
    if (itemObject["Title"] === "2693") {
        itemStr += `<div class='item-title title-${itemObject["QualityCode"]}'>Delerium</div>`;
    } else {
        itemStr += `<div class='item-title title-${itemObject["QualityCode"]}'>${itemObject["Title"]}</div>`;
    }

    // Quality tag
    if (itemObject["QualityCode"] !== "q_normal") {
        itemStr += `<div class='item-tag tag-${itemObject["QualityCode"]}'>${itemObject["Tag"]}</div>`;
    }

    // Rune tag, if applicable
    if ("RuneTag" in itemObject && itemObject["QualityCode"] === "q_runeword") {
        itemStr += `<div class='item-runetag title-q_runeword'>${itemObject["RuneTag"]}</div>`;
    }

    // Defense and block (only show what's present)
    let defenseBlock = [];
    if ("Defense" in itemObject) {
        defenseBlock.push(`Defense: ${itemObject["Defense"]}`);
    }
    if ("Block" in itemObject) {
        defenseBlock.push(`Chance to Block: ${itemObject["Block"]}`);
    }
    if (defenseBlock.length > 0) {
        itemStr += `<div class='item-defense-block'>${defenseBlock.join(" | ")}</div>`;
    }

    // Weapon damage
    let minmaxDamage = [];
    if ("DamageMinimum" in itemObject) {
        minmaxDamage.push(`Damage: ${itemObject["DamageMinimum"]} - ${itemObject["DamageMaximum"]}`);
    }
    if (minmaxDamage.length > 0) {
        itemStr += `<div class='item-damage'>${minmaxDamage.join(" | ")}</div>`;
    }

        // Item level and durability
    let levelDurability = [];
    if ("ItemLevel" in itemObject) {
        levelDurability.push(`Item Level: ${itemObject["ItemLevel"]}`);
    }
    if ("Durability" in itemObject) {
        levelDurability.push(`Durability: ${itemObject["Durability"]}/${itemObject["DurabilityMaximum"]}`);
    }
    if (levelDurability.length > 0) {
        itemStr += `<div class='item-level-durability'>${levelDurability.join(" | ")}</div>`;
    }

    // Property list (handling "Corrupted" specifically)
    itemObject["PropertyList"].forEach(property => {
        if (/corrupted/i.test(property)) {
            itemStr += `<div class='item-corrupted'>Corrupted</div>`;
        } else {
            // ✅ Remove "-Up" if the property ends with "when you Level-Up"
            const cleanedProperty = property.replace(/(when you Level)-Up$/, "$1");
            itemStr += `<div class='item-property'>${cleanedProperty}</div>`;
        }
    });


    // ✅ Display socketed items if present and not a runeword
    if (
        itemObject["QualityCode"] !== "q_runeword" &&
        itemObject["Sockets"] &&
        typeof itemObject["Sockets"] === "object"
    ) {
        const socketNameCounts = {};

        Object.values(itemObject["Sockets"]).forEach(socketedItem => {
            if (socketedItem?.Title) {
                // ✅ Label Rare Jewels properly
                let displayName = socketedItem.Title;
                if (socketedItem.Quality === "Rare" && /jewel/i.test(socketedItem.Tag || "")) {
                    displayName = `Misc. Rare Jewel`;
                }
                if (socketedItem.Quality === "Magic" && /jewel/i.test(socketedItem.Tag || "")) {
                    displayName = `Misc. Magic Jewel`;
                }

                socketNameCounts[displayName] = (socketNameCounts[displayName] || 0) + 1;
            }
        });

        const socketedSummary = Object.entries(socketNameCounts)
            .map(([name, count]) => (count > 1 ? `${name} x${count}` : name))
            .join("<br> ");

        if (socketedSummary) {
            itemStr += `<div class='item-sockets'><strong>Socketed With:</strong><br> ${socketedSummary}</div>`;
        }
    }



    console.log("Tooltip content for item:", itemStr);
    return itemStr;
}

    } else {  
        imageHTML = `<img id="${hoverContainerId}-${itemObject["Worn"]}-img" src="https://pathofdiablo.com/p/armory/img/items/${itemObject["Title"].toLowerCase().replace(/ /g, "_").replace(/'/g, "%27")}.gif" width="90%" height="auto" />`;
    }
    console.log("Tooltip appended with content:", imageHTML);  // Debugging check

function renderCharms(inventoryItems) {
    // Clear any existing charms from all predefined slots
    for (let y = 0; y < 4; y++) {
        for (let x = 0; x < 10; x++) {
            $(`#charm-${x}-${y}`).empty().removeClass('charm-occupied');
        }
    }
    
    // Filter for charms only in the bottom 4 rows (y >= 5, which are rows 5,6,7,8)
    const charms = inventoryItems.filter(item => {
        const isCharm = item["TextTag"] && item["TextTag"].toLowerCase().includes("charm");
        const position = item["Position"];
        const inBottomRows = position && position.y >= 5 && position.y <= 8;
        return isCharm && inBottomRows;
    });
    
    console.log("Found charms in bottom 4 rows:", charms.length);
    
    // Place charms in their slots
    charms.forEach((charm, index) => {
        const position = charm["Position"];
        const size = charm["Size"];
        
        if (!position || !size) {
            console.warn("Charm missing position or size data:", charm);
            return;
        }
        
        // Adjust y position to be relative to the charm inventory (row 5 becomes 0)
        const gridX = position.x;
        const gridY = position.y - 5;
        
        // Find the slot for this charm
        const slotId = `charm-${gridX}-${gridY}`;
        const slot = $(`#${slotId}`);
        
        if (slot.length === 0) {
            console.warn("Slot not found for charm:", slotId);
            return;
        }
        
        // Create charm content (image + tooltip)
        const charmContent = createCharmContent(charm, index, size);
        slot.append(charmContent);
        
        // If charm spans multiple cells, mark those cells as occupied
        if (size.invwidth > 1 || size.invheight > 1) {
            for (let dy = 0; dy < size.invheight; dy++) {
                for (let dx = 0; dx < size.invwidth; dx++) {
                    if (dx === 0 && dy === 0) continue; // Skip the main cell
                    const occupiedSlotId = `charm-${gridX + dx}-${gridY + dy}`;
                    $(`#${occupiedSlotId}`).addClass('charm-occupied');
                }
            }
        }
    });
}

function createCharmContent(charmObject, index, size) {
    // Determine charm image based on Tag field
    let charmImage = "";
    const tag = charmObject["Tag"].toLowerCase();
    const title = charmObject["Title"] ? charmObject["Title"].toLowerCase() : "";
    
    // Check for unique charms first
    if (tag === "large charm" && title.includes("hellfire torch")) {
        charmImage = "torch.png";
    } else if (tag === "small charm" && title.includes("annihilus")) {
        charmImage = "anni.png";
    } else if (tag === "small charm") {
        charmImage = "charms.png";
    } else if (tag === "large charm") {
        charmImage = "charml.png";
    } else if (tag === "grand charm") {
        charmImage = "charmg.png";
    } else {
        charmImage = "charms.png";
    }
    
    const imageUrl = `./img/${charmImage}`;
    
    // Calculate exact pixel size for multi-cell charms (95% of cell size)
    const cellWidth = 59;
    const cellHeight = 58;
    const width = size.invwidth * cellWidth * 0.95;
    const height = size.invheight * cellHeight * 0.95;
    
    // Generate tooltip content
    const tooltipContent = createItemHTML(charmObject);
    const propertySize = charmObject["PropertyList"].length;
    const maxCharWidth = Math.max.apply(Math, charmObject["PropertyList"].map(x => x.length));
    const tooltipClass = propertySize > 10 || maxCharWidth > 40 ? "itemhover-box itemhover-box-small" : "itemhover-box";
    
    return `
        <div class="charm-hover-wrapper" style="
            width: ${width}px;
            height: ${height}px;
            position: absolute;
            top: 0;
            left: 0;
        ">
            <img src="${imageUrl}" style="
                width: 100%;
                height: 100%;
                display: block;
                pointer-events: none;
            " />
            <div class="${tooltipClass}">
                ${tooltipContent}
            </div>
        </div>
    `;
}

// Setup weapon swap click handlers
function setupWeaponSwapHandlers() {
    // Add click handler for weapon1 slot
    $("#hover-container-weapon1").off('click').on('click', function(e) {
        e.stopPropagation();
        toggleWeaponSwap();
    });
    
    // Add click handler for weapon2 slot
    $("#hover-container-weapon2").off('click').on('click', function(e) {
        e.stopPropagation();
        toggleWeaponSwap();
    });
}

// Toggle between primary and swap weapons (both weapons swap together)
function toggleWeaponSwap() {
    console.log("Toggling weapon swap");
    
    // Check if swap weapons exist
    if (!window.weaponData.sweapon1 && !window.weaponData.sweapon2) {
        console.log("No swap weapons available");
        return;
    }
    
    // Toggle the swap state for both weapons
    window.weaponSwapState = !window.weaponSwapState;
    const isSwapped = window.weaponSwapState;
    
    // Update weapon1
    const $container1 = $("#hover-container-weapon1");
    $container1.empty();
    const weaponToDisplay1 = isSwapped ? window.weaponData.sweapon1 : window.weaponData.weapon1;
    if (weaponToDisplay1) {
        $container1.append(createImageHTML(weaponToDisplay1, "hover-container-weapon1"));
        if (isSwapped) {
            $container1.addClass('swapped');
        } else {
            $container1.removeClass('swapped');
        }
    }
    
    // Update weapon2
    const $container2 = $("#hover-container-weapon2");
    $container2.empty();
    const weaponToDisplay2 = isSwapped ? window.weaponData.sweapon2 : window.weaponData.weapon2;
    if (weaponToDisplay2) {
        $container2.append(createImageHTML(weaponToDisplay2, "hover-container-weapon2"));
        if (isSwapped) {
            $container2.addClass('swapped');
        } else {
            $container2.removeClass('swapped');
        }
    }
    
    console.log("Swapped to " + (isSwapped ? "swap" : "primary") + " weapons");
}
